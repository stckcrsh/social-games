description: Show Outline Agent — prompt engineering tests

prompts:
  - file://prompts/showOutlinePrompt.ts

providers:
  - id: openai:gpt-4o
    config:
      temperature: 0
      max_tokens: 2048

tests:
  - description: "stacked-requests: two managers stack requests for the same matchup"
    vars:
      week: 1
      wrestlers: file://../data/scenarios/outline/stacked-requests/wrestlers.json
      managers: file://../data/scenarios/outline/stacked-requests/managers.json
      submissions: file://../data/scenarios/outline/stacked-requests/submissions.json
      thoughtProcess: file://../data/scenarios/outline/stacked-requests/thoughtProcess.json
      threads: file://../data/scenarios/outline/stacked-requests/threads.json
    assert:
      - type: javascript
        value: file://assertions/bookingRules.mjs
      - type: llm-rubric
        value: >
          The show request with the highest effective bribe became the headliner.
          (Effective bribe = sum of bribeAmounts when two managers request the same
          matchup — a "stacked" request.) Given the SUBMISSIONS_JSON context and
          the output, was booking priority correctly followed?
      - type: llm-rubric
        value: >
          Each promo segment has exactly one stated goal: either self-hype OR
          targeting a rival — not both simultaneously.

  - description: "bribing: $2000 bid wins headliner in at least 8 of 10 runs"
    vars:
      week: 1
      wrestlers: file://../data/scenarios/outline/bribing/wrestlers.json
      managers: file://../data/scenarios/outline/bribing/managers.json
      submissions: file://../data/scenarios/outline/bribing/submissions.json
      thoughtProcess: file://../data/scenarios/outline/bribing/thoughtProcess.json
      threads: file://../data/scenarios/outline/bribing/threads.json
    options:
      numRepeat: 10
    assert:
      - type: javascript
        value: file://assertions/bookingRules.mjs
        threshold: 1.0
      - type: llm-rubric
        value: >
          The wrestler managed by m-007 (wrestlerId w-007, known as "Golden Tyrant")
          is in the headliner match. Their manager submitted a $2000 bribe, by far
          the highest in the card. Was this honored?
        threshold: 0.8

  - description: "interference-prone: Rookie Blaze should appear as interference given personality and context"
    vars:
      week: 1
      wrestlers: file://../data/scenarios/outline/interference-prone/wrestlers.json
      managers: file://../data/scenarios/outline/interference-prone/managers.json
      submissions: file://../data/scenarios/outline/interference-prone/submissions.json
      thoughtProcess: file://../data/scenarios/outline/interference-prone/thoughtProcess.json
      threads: file://../data/scenarios/outline/interference-prone/threads.json
    assert:
      - type: javascript
        value: file://assertions/bookingRules.mjs
      - type: llm-rubric
        value: >
          Given that Rookie Blaze (w-006) just turned heel and caused chaos last week
          (as described in the wrestler mindsets), and one manager explicitly noted
          Blaze might show up — did the booker book any interference involving Blaze,
          or at minimum reflect the Blaze storyline in segment goals or promo targets?
